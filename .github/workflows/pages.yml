name: Deploy web to GitHub Pages

# web/ 폴더의 정적 사이트를 GitHub Pages로 배포합니다.
# (정적 호스팅이라 /api 서버리스 함수는 동작하지 않고, 화면은 샘플 데이터로 폴백합니다.
#  실시간 데이터까지 쓰려면 Vercel 배포를 권장 — README 참고)
#
# 최초 1회: 저장소 Settings → Pages → Source 를 "GitHub Actions" 로 설정하세요.

on:
  push:
    branches: [main]
    paths: ["web/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deployment
        uses: actions/deploy-pages@v4
