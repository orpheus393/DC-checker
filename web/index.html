<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>차트월드 · 영화·음악·세상의 모든 순위</title>
<meta name="description" content="빌보드, 박스오피스, 유튜브 뮤직 등 세상의 모든 차트와 정보를 한눈에." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink:        #14101d;
    --ink-soft:   #1e1830;
    --card:       #241d39;
    --line:       #3a3155;
    --text:       #f3effa;
    --muted:      #a79bc4;
    --gold:       #f5c451;
    --gold-deep:  #d99a2b;
    --up:         #4ad6a0;
    --down:       #ff6b81;
    --flat:       #8b81a8;
    --radius:     16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', system-ui, sans-serif;
    background:
      radial-gradient(1200px 600px at 50% -10%, rgba(245,196,81,0.14), transparent 60%),
      var(--ink);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .wrap { max-width: 880px; margin: 0 auto; padding: 0 20px 80px; }

  header { text-align: center; padding: 56px 0 28px; }
  .brand {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 11vw, 92px);
    line-height: 0.92; letter-spacing: 2px;
    background: linear-gradient(180deg, #fff 0%, var(--gold) 130%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    text-wrap: balance;
  }
  .tagline { margin-top: 10px; color: var(--muted); font-size: 15px; letter-spacing: 0.5px; }

  .tabs {
    display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
    margin: 28px 0 8px; position: sticky; top: 0; padding: 14px 0;
    background: linear-gradient(180deg, var(--ink) 70%, transparent); z-index: 10;
  }
  .tab {
    border: 1px solid var(--line); background: transparent; color: var(--muted);
    font-family: inherit; font-size: 14px; font-weight: 700;
    padding: 10px 18px; border-radius: 999px; cursor: pointer; transition: all 0.18s ease;
  }
  .tab:hover { color: var(--text); border-color: var(--gold-deep); }
  .tab[aria-selected="true"] { background: var(--gold); border-color: var(--gold); color: #2a1d05; }
  .tab:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

  .chart-head {
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 12px; margin: 18px 4px 14px; flex-wrap: wrap;
  }
  .chart-title { font-size: 22px; font-weight: 900; }
  .chart-meta { font-size: 13px; color: var(--muted); }

  /* ── 1위 스포트라이트 ── */
  .hero {
    display: grid; grid-template-columns: 132px 1fr; gap: 20px;
    background:
      radial-gradient(420px 200px at 0% 0%, rgba(245,196,81,0.16), transparent 70%),
      var(--card);
    border: 1px solid var(--gold-deep); border-radius: 20px;
    padding: 20px; margin-bottom: 18px; cursor: pointer;
    transition: transform 0.15s ease;
  }
  .hero:hover { transform: translateY(-2px); }
  .hero-art {
    width: 132px; height: 132px; border-radius: 14px; object-fit: cover;
    background: linear-gradient(135deg, var(--ink-soft), var(--line));
    display: grid; place-items: center; font-size: 48px;
  }
  .hero-body { min-width: 0; display: flex; flex-direction: column; gap: 6px; }
  .eyebrow {
    font-size: 12px; font-weight: 700; letter-spacing: 1.5px; color: var(--gold);
    display: flex; align-items: center; gap: 8px;
  }
  .hero-title { font-size: 26px; font-weight: 900; line-height: 1.15; text-wrap: balance; }
  .hero-sub { font-size: 15px; color: var(--muted); }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  .chip {
    font-size: 12px; color: var(--text); background: var(--ink-soft);
    border: 1px solid var(--line); border-radius: 999px; padding: 3px 10px;
  }
  .chip b { color: var(--gold); font-weight: 700; }
  .hero-desc {
    font-size: 13px; color: var(--muted); line-height: 1.55; margin-top: 4px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .cta {
    align-self: flex-start; margin-top: 8px; text-decoration: none;
    font-size: 13px; font-weight: 700; color: #2a1d05; background: var(--gold);
    padding: 8px 16px; border-radius: 999px; transition: opacity 0.15s ease;
  }
  .cta:hover { opacity: 0.88; }

  /* ── 순위 리스트 ── */
  .list { display: flex; flex-direction: column; gap: 10px; }
  .row {
    display: grid; grid-template-columns: 48px 52px 1fr auto; align-items: center; gap: 14px;
    background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 12px 16px; cursor: pointer;
    transition: transform 0.15s ease, border-color 0.15s ease;
  }
  .row:hover { transform: translateY(-2px); border-color: var(--gold-deep); }
  .rank {
    font-family: 'Bebas Neue', sans-serif; font-size: 32px; line-height: 1;
    color: var(--gold); text-align: center; font-variant-numeric: tabular-nums;
  }
  .art {
    width: 52px; height: 52px; border-radius: 10px; object-fit: cover;
    background: linear-gradient(135deg, var(--ink-soft), var(--line));
    display: grid; place-items: center; font-size: 22px;
  }
  .info { min-width: 0; }
  .title { font-weight: 700; font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sub { font-size: 13px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .change {
    font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 4px;
    font-variant-numeric: tabular-nums; min-width: 48px; justify-content: flex-end;
  }
  .up { color: var(--up); } .down { color: var(--down); } .flat { color: var(--flat); }
  .new { color: #2a1d05; background: var(--gold); padding: 2px 8px; border-radius: 6px; font-size: 11px; }

  .badge { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 999px; letter-spacing: 0.3px; white-space: nowrap; }
  .badge.live { color: #06281c; background: var(--up); }
  .badge.sample { color: var(--muted); background: var(--ink-soft); border: 1px solid var(--line); }
  .loading { text-align: center; color: var(--muted); padding: 40px 0; }

  .note {
    margin: 22px 4px 0; font-size: 13px; color: var(--muted);
    background: var(--ink-soft); border: 1px dashed var(--line); border-radius: 12px;
    padding: 14px 16px; line-height: 1.6;
  }
  .note b { color: var(--gold); }
  footer { text-align: center; color: var(--flat); font-size: 12px; margin-top: 40px; }

  /* ── 상세 정보 모달 ── */
  .overlay {
    position: fixed; inset: 0; background: rgba(8,5,16,0.74); backdrop-filter: blur(4px);
    display: none; align-items: center; justify-content: center; padding: 20px; z-index: 100;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--card); border: 1px solid var(--line); border-radius: 20px;
    max-width: 520px; width: 100%; max-height: 88vh; overflow-y: auto; padding: 24px;
    position: relative;
  }
  .modal-close {
    position: absolute; top: 14px; right: 14px; width: 34px; height: 34px; border-radius: 50%;
    border: 1px solid var(--line); background: var(--ink-soft); color: var(--text);
    font-size: 18px; cursor: pointer; line-height: 1;
  }
  .modal-close:hover { border-color: var(--gold-deep); }
  .modal-head { display: flex; gap: 16px; align-items: flex-start; }
  .modal-art {
    width: 96px; height: 96px; border-radius: 12px; object-fit: cover; flex-shrink: 0;
    background: linear-gradient(135deg, var(--ink-soft), var(--line));
    display: grid; place-items: center; font-size: 40px;
  }
  .modal-rank { font-size: 12px; font-weight: 700; letter-spacing: 1px; color: var(--gold); }
  .modal-title { font-size: 22px; font-weight: 900; line-height: 1.2; margin-top: 2px; text-wrap: balance; }
  .modal-sub { font-size: 14px; color: var(--muted); margin-top: 4px; }
  .modal-meta { display: flex; flex-direction: column; gap: 8px; margin: 18px 0; }
  .meta-row { display: flex; gap: 12px; font-size: 14px; border-bottom: 1px solid var(--line); padding-bottom: 8px; }
  .meta-row .k { color: var(--muted); min-width: 72px; }
  .meta-row .v { color: var(--text); font-weight: 500; }
  .modal-desc { font-size: 14px; color: var(--muted); line-height: 1.65; white-space: pre-line; }
  .modal .cta { display: inline-block; margin-top: 18px; }

  /* 관련 소식 (네이버 검색) */
  .relnews { margin-top: 22px; border-top: 1px solid var(--line); padding-top: 16px; }
  .relnews h4 { font-size: 13px; color: var(--gold); letter-spacing: 0.5px; margin-bottom: 12px; }
  .relnews .hint { font-size: 13px; color: var(--flat); line-height: 1.6; }
  .news-item { display: block; text-decoration: none; padding: 10px 0; border-bottom: 1px solid var(--line); }
  .news-item:last-child { border-bottom: 0; }
  .news-item .nt { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.4; }
  .news-item:hover .nt { color: var(--gold); }
  .news-item .nd { font-size: 12.5px; color: var(--muted); margin-top: 3px; line-height: 1.5;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .news-item .nm { font-size: 11px; color: var(--flat); margin-top: 4px; }
  .news-tag { display: inline-block; font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: 999px;
    background: var(--ink-soft); border: 1px solid var(--line); color: var(--muted); margin-right: 6px; }

  @media (max-width: 540px) {
    .hero { grid-template-columns: 96px 1fr; gap: 14px; padding: 16px; }
    .hero-art { width: 96px; height: 96px; font-size: 36px; }
    .hero-title { font-size: 21px; }
    .row { grid-template-columns: 38px 46px 1fr auto; gap: 10px; padding: 10px 12px; }
    .art { width: 46px; height: 46px; }
    .rank { font-size: 26px; }
  }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1 class="brand">CHART&nbsp;WORLD</h1>
      <p class="tagline">영화 · 음악 · 세상의 순위와 정보를 한눈에</p>
    </header>

    <nav class="tabs" role="tablist" aria-label="차트 종류">
      <button class="tab" role="tab" aria-selected="true"  data-chart="music">🎵 인기 음악</button>
      <button class="tab" role="tab" aria-selected="false" data-chart="movies">🎬 미국 박스오피스</button>
      <button class="tab" role="tab" aria-selected="false" data-chart="youtube">▶️ 유튜브 뮤직</button>
      <button class="tab" role="tab" aria-selected="false" data-chart="billboard">🏆 빌보드</button>
    </nav>

    <div class="chart-head">
      <div class="chart-title" id="chartTitle">인기 음악</div>
      <div style="display:flex;align-items:center;gap:10px;">
        <span class="badge sample" id="srcBadge">샘플</span>
        <span class="chart-meta" id="chartMeta"></span>
      </div>
    </div>

    <div id="hero"></div>
    <div class="list" id="list" role="tabpanel" aria-live="polite"></div>

    <div class="note">
      💡 항목을 <b>클릭</b>하면 상세 정보가 떠요. 출처 —
      🎵 <b>Apple Music</b> 인기곡 · 🎬 <b>Box Office Mojo</b> 미국 주말 박스오피스 ·
      ▶️ <b>YouTube</b> 공식 API · 🏆 <b>빌보드 HOT 100</b> 공개 데이터셋.
      (외부 소스가 막히면 자동으로 샘플로 표시됩니다.)
    </div>

    <footer>© 2026 CHART WORLD · 프로토타입</footer>
  </div>

  <!-- 상세 정보 모달 -->
  <div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="mTitle">
    <div class="modal" id="modal">
      <button class="modal-close" id="modalClose" aria-label="닫기">✕</button>
      <div id="modalContent"></div>
    </div>
  </div>

<script src="data.js"></script>
<script>
  const list = document.getElementById('list');
  const heroEl = document.getElementById('hero');
  const titleEl = document.getElementById('chartTitle');
  const metaEl = document.getElementById('chartMeta');
  const badge = document.getElementById('srcBadge');
  const overlay = document.getElementById('overlay');
  const modalContent = document.getElementById('modalContent');
  const tabs = [...document.querySelectorAll('.tab')];
  let current = [];        // 현재 표시 중인 항목들 (모달 참조용)
  let currentKey = 'music';  // 현재 차트 종류 (검색어 구성용)

  const esc = (s) => String(s ?? '').replace(/[&<>"]/g, c =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

  // 앨범아트를 더 크게 (Apple URL의 100x100 → 600x600)
  const bigImg = (u) => u ? u.replace(/\/\d+x\d+bb/, '/600x600bb') : u;

  // ── 데이터 소스 & 가공 (브라우저 직접 호출용) ──────────
  const SOURCES = {
    music: {
      direct: 'https://rss.marketingtools.apple.com/api/v2/kr/music/most-played/25/songs.json',
      proxy:  '/api/music',
      parse: (d) => ({
        title: '글로벌 인기 음악', meta: '실시간 · Apple Music',
        items: (d.feed?.results || []).slice(0, 10).map((s) => ({
          title: s.name, sub: s.artistName, image: s.artworkUrl100,
          link: s.url, linkLabel: 'Apple Music에서 보기', emoji: '🎵', change: 0,
          meta: [
            (s.genres || []).map(g => g.genreName).filter(n => n !== 'Music')[0] && { k: '장르', v: (s.genres || []).map(g => g.genreName).filter(n => n !== 'Music')[0] },
            s.releaseDate && { k: '발매일', v: s.releaseDate },
          ].filter(Boolean),
        })),
      }),
    },
    movies: { proxy: '/api/movies' },   // 서버에서 Box Office Mojo 스크래핑 (브라우저 직접 호출 불가)
    youtube: { proxy: '/api/youtube' },   // 키 필요, 미설정 시 샘플
    billboard: {
      direct: 'https://raw.githubusercontent.com/mhollingshead/billboard-hot-100/main/recent.json',
      proxy:  '/api/billboard',
      parse: (d) => ({
        title: '빌보드 HOT 100', meta: '실시간 · ' + (d.date || ''),
        items: (d.data || []).slice(0, 10).map((s) => ({
          title: s.song, sub: s.artist, emoji: '🏆',
          change: s.last_week == null ? 'new' : (s.last_week - s.this_week),
          meta: [
            s.peak_position && { k: '최고순위', v: s.peak_position + '위' },
            s.weeks_on_chart && { k: '차트인', v: s.weeks_on_chart + '주' },
          ].filter(Boolean),
        })),
      }),
    },
  };

  function changeBadge(c) {
    if (c === 'new')  return '<span class="new">NEW</span>';
    if (c === 0)      return '<span class="change flat">—</span>';
    if (c > 0)        return `<span class="change up">▲ ${c}</span>`;
    return `<span class="change down">▼ ${Math.abs(c)}</span>`;
  }

  function artHtml(it, cls, big) {
    const src = big ? bigImg(it.image) : it.image;
    return src
      ? `<img class="${cls}" src="${esc(src)}" alt="" loading="lazy" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'${cls}',textContent:'${it.emoji || '🎶'}'}))">`
      : `<div class="${cls}">${it.emoji || '🎶'}</div>`;
  }

  function chipsHtml(it) {
    return (it.meta || []).map(m => `<span class="chip"><b>${esc(m.k)}</b> ${esc(m.v)}</span>`).join('');
  }

  function paint(data, isLive) {
    current = data.items;
    titleEl.textContent = data.title;
    metaEl.textContent = data.meta;
    badge.textContent = isLive ? '실시간' : '샘플';
    badge.className = 'badge ' + (isLive ? 'live' : 'sample');

    // 1위 스포트라이트
    const top = data.items[0];
    heroEl.innerHTML = top ? `
      <div class="hero" data-i="0">
        ${artHtml(top, 'hero-art', true)}
        <div class="hero-body">
          <div class="eyebrow">★ 이번 주 1위 ${changeBadge(top.change)}</div>
          <div class="hero-title">${esc(top.title)}</div>
          <div class="hero-sub">${esc(top.sub)}</div>
          <div class="chips">${chipsHtml(top)}</div>
          ${top.desc ? `<div class="hero-desc">${esc(top.desc)}</div>` : ''}
          ${top.link ? `<a class="cta" href="${esc(top.link)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${esc(top.linkLabel || '자세히 보기')} ↗</a>` : '<span class="hero-desc">눌러서 상세 정보 보기</span>'}
        </div>
      </div>` : '';

    // 2위 이하 목록
    list.innerHTML = data.items.slice(1).map((it, idx) => {
      const i = idx + 1;
      return `
        <div class="row" data-i="${i}">
          <div class="rank">${i + 1}</div>
          ${artHtml(it, 'art', false)}
          <div class="info">
            <div class="title">${esc(it.title)}</div>
            <div class="sub">${esc(it.sub)}</div>
          </div>
          ${changeBadge(it.change)}
        </div>`;
    }).join('');
  }

  // ── 상세 모달 ──────────────────────────────
  function openModal(i) {
    const it = current[i];
    if (!it) return;
    const metaRows = (it.meta || []).map(m =>
      `<div class="meta-row"><span class="k">${esc(m.k)}</span><span class="v">${esc(m.v)}</span></div>`).join('');
    modalContent.innerHTML = `
      <div class="modal-head">
        ${artHtml(it, 'modal-art', true)}
        <div>
          <div class="modal-rank">${i + 1}위 ${it.change === 'new' ? '· 신규' : ''}</div>
          <div class="modal-title" id="mTitle">${esc(it.title)}</div>
          <div class="modal-sub">${esc(it.sub)}</div>
        </div>
      </div>
      ${metaRows ? `<div class="modal-meta">${metaRows}</div>` : '<div style="height:8px"></div>'}
      ${it.desc ? `<div class="modal-desc">${esc(it.desc)}</div>` : ''}
      ${it.link ? `<a class="cta" href="${esc(it.link)}" target="_blank" rel="noopener">${esc(it.linkLabel || '자세히 보기')} ↗</a>` : ''}
      <div class="relnews" id="relnews"><h4>📰 왜 화제일까 · 관련 소식</h4><div class="hint">불러오는 중…</div></div>
    `;
    overlay.classList.add('open');
    document.getElementById('modalClose').focus();
    loadNews(it);
  }

  // 네이버 검색으로 "관련 소식" 채우기
  async function newsQuery(it) {
    // 음악/유튜브는 제목+아티스트, 그 외는 제목만
    const withArtist = (currentKey === 'music' || currentKey === 'youtube');
    return (it.title + (withArtist && it.sub ? ' ' + it.sub : '')).trim();
  }
  async function loadNews(it) {
    const box = document.getElementById('relnews');
    if (!box) return;
    try {
      const q = await newsQuery(it);
      const r = await fetch('/api/naver?q=' + encodeURIComponent(q));
      if (r.status === 503) {   // 키 미설정
        box.innerHTML = '<h4>📰 왜 화제일까 · 관련 소식</h4>' +
          '<div class="hint">네이버 검색 키(NAVER_CLIENT_ID/SECRET)를 설정하면 여기에 관련 뉴스·블로그가 표시돼요.</div>';
        return;
      }
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const data = await r.json();
      if (!data.items || !data.items.length) { box.innerHTML = ''; return; }
      box.innerHTML = '<h4>📰 왜 화제일까 · 관련 소식</h4>' + data.items.map(n => `
        <a class="news-item" href="${esc(n.link)}" target="_blank" rel="noopener">
          <div class="nt"><span class="news-tag">${esc(n.type)}</span>${esc(n.title)}</div>
          ${n.desc ? `<div class="nd">${esc(n.desc)}</div>` : ''}
          <div class="nm">${esc(n.source || '')}${n.source && n.date ? ' · ' : ''}${esc(n.date || '')}</div>
        </a>`).join('');
    } catch (e) {
      box.innerHTML = '';   // 실패 시 조용히 숨김
    }
  }
  function closeModal() { overlay.classList.remove('open'); }

  document.getElementById('modalClose').addEventListener('click', closeModal);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

  // 항목 클릭 → 모달 (hero, list 공통)
  [heroEl, list].forEach(container =>
    container.addEventListener('click', (e) => {
      const el = e.target.closest('[data-i]');
      if (el) openModal(Number(el.dataset.i));
    }));

  // ── 데이터 로드 ────────────────────────────
  async function tryJson(url, parse) {
    const r = await fetch(url);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const raw = await r.json();
    const data = parse ? parse(raw) : raw;
    if (!data.items || !data.items.length) throw new Error('empty');
    return data;
  }

  async function render(key) {
    currentKey = key;
    const src = SOURCES[key];
    heroEl.innerHTML = '';
    if (src) {
      list.innerHTML = '<div class="loading">불러오는 중…</div>';
      if (src.direct) { try { return paint(await tryJson(src.direct, src.parse), true); } catch (e) {} }
      if (src.proxy)  { try { return paint(await tryJson(src.proxy), true); } catch (e) {} }
    }
    paint(CHARTS[key], false);
  }

  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      tabs.forEach(t => t.setAttribute('aria-selected', 'false'));
      tab.setAttribute('aria-selected', 'true');
      render(tab.dataset.chart);
    });
  });

  render('music');
</script>
</body>
</html>
