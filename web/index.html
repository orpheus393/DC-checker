<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>차트월드 · 영화·음악·세상의 모든 순위</title>
<meta name="description" content="빌보드, 박스오피스, 유튜브 뮤직 등 세상의 모든 차트를 한눈에." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink:        #14101d;   /* 딥 잉크(자줏빛 한 방울) */
    --ink-soft:   #1e1830;
    --card:       #241d39;
    --line:       #3a3155;
    --text:       #f3effa;
    --muted:      #a79bc4;
    --gold:       #f5c451;   /* 스포트라이트 골드 */
    --gold-deep:  #d99a2b;
    --up:         #4ad6a0;
    --down:       #ff6b81;
    --flat:       #8b81a8;
    --radius:     16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', system-ui, sans-serif;
    background:
      radial-gradient(1200px 600px at 50% -10%, rgba(245,196,81,0.14), transparent 60%),
      var(--ink);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .wrap { max-width: 880px; margin: 0 auto; padding: 0 20px 80px; }

  /* ── 헤더 ── */
  header { text-align: center; padding: 56px 0 28px; }
  .brand {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 11vw, 92px);
    line-height: 0.92;
    letter-spacing: 2px;
    background: linear-gradient(180deg, #fff 0%, var(--gold) 130%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-wrap: balance;
  }
  .tagline {
    margin-top: 10px;
    color: var(--muted);
    font-size: 15px;
    letter-spacing: 0.5px;
  }

  /* ── 탭 ── */
  .tabs {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    margin: 28px 0 8px;
    position: sticky;
    top: 0;
    padding: 14px 0;
    background: linear-gradient(180deg, var(--ink) 70%, transparent);
    z-index: 10;
  }
  .tab {
    border: 1px solid var(--line);
    background: transparent;
    color: var(--muted);
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    padding: 10px 18px;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.18s ease;
  }
  .tab:hover { color: var(--text); border-color: var(--gold-deep); }
  .tab[aria-selected="true"] {
    background: var(--gold);
    border-color: var(--gold);
    color: #2a1d05;
  }
  .tab:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

  /* ── 차트 헤더 ── */
  .chart-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    margin: 18px 4px 14px;
    flex-wrap: wrap;
  }
  .chart-title { font-size: 22px; font-weight: 900; }
  .chart-meta { font-size: 13px; color: var(--muted); }

  /* ── 순위 리스트 ── */
  .list { display: flex; flex-direction: column; gap: 10px; }
  .row {
    display: grid;
    grid-template-columns: 56px 56px 1fr auto;
    align-items: center;
    gap: 14px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 12px 16px;
    transition: transform 0.15s ease, border-color 0.15s ease;
  }
  .row:hover { transform: translateY(-2px); border-color: var(--gold-deep); }

  .rank {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 34px;
    line-height: 1;
    color: var(--gold);
    text-align: center;
    font-variant-numeric: tabular-nums;
  }
  .row:nth-child(1) .rank,
  .row:nth-child(2) .rank,
  .row:nth-child(3) .rank { font-size: 42px; }

  .art {
    width: 56px; height: 56px;
    border-radius: 10px;
    object-fit: cover;
    background: linear-gradient(135deg, var(--ink-soft), var(--line));
    display: grid; place-items: center;
    font-size: 22px;
  }

  .info { min-width: 0; }
  .title {
    font-weight: 700; font-size: 16px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .sub { font-size: 13px; color: var(--muted); margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .change {
    font-size: 13px; font-weight: 700;
    display: flex; align-items: center; gap: 4px;
    font-variant-numeric: tabular-nums;
    min-width: 48px; justify-content: flex-end;
  }
  .up   { color: var(--up); }
  .down { color: var(--down); }
  .flat { color: var(--flat); }
  .new  { color: #2a1d05; background: var(--gold); padding: 2px 8px; border-radius: 6px; font-size: 11px; }

  /* 데이터 출처 배지 */
  .badge {
    font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 999px;
    letter-spacing: 0.3px; white-space: nowrap;
  }
  .badge.live   { color: #06281c; background: var(--up); }
  .badge.sample { color: var(--muted); background: var(--ink-soft); border: 1px solid var(--line); }
  .loading { text-align: center; color: var(--muted); padding: 40px 0; }

  /* ── 안내 배너 ── */
  .note {
    margin: 22px 4px 0;
    font-size: 13px;
    color: var(--muted);
    background: var(--ink-soft);
    border: 1px dashed var(--line);
    border-radius: 12px;
    padding: 14px 16px;
    line-height: 1.6;
  }
  .note b { color: var(--gold); }

  footer { text-align: center; color: var(--flat); font-size: 12px; margin-top: 40px; }

  @media (max-width: 520px) {
    .row { grid-template-columns: 44px 44px 1fr auto; gap: 10px; padding: 10px 12px; }
    .art { width: 44px; height: 44px; }
    .rank { font-size: 28px; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1 class="brand">CHART&nbsp;WORLD</h1>
      <p class="tagline">영화 · 음악 · 세상의 모든 순위를 한눈에</p>
    </header>

    <nav class="tabs" role="tablist" aria-label="차트 종류">
      <button class="tab" role="tab" aria-selected="true"  data-chart="billboard">🎵 빌보드 HOT 100</button>
      <button class="tab" role="tab" aria-selected="false" data-chart="boxoffice">🎬 박스오피스</button>
      <button class="tab" role="tab" aria-selected="false" data-chart="youtube">▶️ 유튜브 뮤직</button>
    </nav>

    <div class="chart-head">
      <div class="chart-title" id="chartTitle">빌보드 HOT 100</div>
      <div style="display:flex;align-items:center;gap:10px;">
        <span class="badge sample" id="srcBadge">샘플</span>
        <span class="chart-meta" id="chartMeta"></span>
      </div>
    </div>

    <div class="list" id="list" role="tabpanel" aria-live="polite"></div>

    <div class="note">
      ⚠️ 지금 보이는 순위는 <b>디자인 확인용 샘플 데이터</b>예요.
      실제 실시간 차트로 바꾸려면 <b>공식 API 연동</b>이 필요합니다 —
      유튜브는 <b>YouTube Data API</b>, 영화는 <b>TMDB API</b> 등.
      (자세한 연동 방법은 <b>README.md</b>에 정리해 두었어요.)
    </div>

    <footer>© 2026 CHART WORLD · 프로토타입</footer>
  </div>

<script src="data.js"></script>
<script>
  const list = document.getElementById('list');
  const titleEl = document.getElementById('chartTitle');
  const metaEl = document.getElementById('chartMeta');
  const badge = document.getElementById('srcBadge');
  const tabs = [...document.querySelectorAll('.tab')];

  // 탭별 실시간 API 경로 (없으면 샘플 데이터만 사용)
  const API = {
    youtube:   '/api/youtube',
    boxoffice: '/api/boxoffice',
    // billboard: 공식 API가 없어 샘플 데이터를 사용합니다.
  };

  function changeBadge(c) {
    if (c === 'new')  return '<span class="new">NEW</span>';
    if (c === 0)      return '<span class="change flat">—</span>';
    if (c > 0)        return `<span class="change up">▲ ${c}</span>`;
    return `<span class="change down">▼ ${Math.abs(c)}</span>`;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"]/g, c =>
      ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
  }

  function paint(data, isLive) {
    titleEl.textContent = data.title;
    metaEl.textContent = data.meta;
    badge.textContent = isLive ? '실시간' : '샘플';
    badge.className = 'badge ' + (isLive ? 'live' : 'sample');
    list.innerHTML = data.items.map((it, i) => `
      <div class="row">
        <div class="rank">${i + 1}</div>
        <div class="art">${it.emoji || '🎶'}</div>
        <div class="info">
          <div class="title">${escapeHtml(it.title)}</div>
          <div class="sub">${escapeHtml(it.sub)}</div>
        </div>
        ${changeBadge(it.change)}
      </div>
    `).join('');
  }

  async function render(key) {
    // 실시간 API가 있으면 먼저 시도, 실패하면 샘플로 폴백
    if (API[key]) {
      list.innerHTML = '<div class="loading">불러오는 중…</div>';
      try {
        const r = await fetch(API[key]);
        if (r.ok) {
          const live = await r.json();
          if (live.items && live.items.length) return paint(live, true);
        }
      } catch (e) { /* 네트워크 실패 → 샘플로 폴백 */ }
    }
    paint(CHARTS[key], false);
  }

  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      tabs.forEach(t => t.setAttribute('aria-selected', 'false'));
      tab.setAttribute('aria-selected', 'true');
      render(tab.dataset.chart);
    });
  });

  render('billboard');
</script>
</body>
</html>
